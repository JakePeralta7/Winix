name: Release

on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Odin
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
          }

          $release = Invoke-RestMethod "https://api.github.com/repos/odin-lang/Odin/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match '^odin-windows-amd64-.*\.zip$' } | Select-Object -First 1
          if (-not $asset) { throw "Could not find a Windows Odin release asset." }

          Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile odin.zip
          Expand-Archive -Path odin.zip -DestinationPath "$env:RUNNER_TEMP\odin" -Force

          $odinExe = Get-ChildItem "$env:RUNNER_TEMP\odin" -Recurse -Filter odin.exe | Select-Object -First 1
          if (-not $odinExe) { throw "odin.exe not found after extraction." }

          "$($odinExe.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$($odinExe.DirectoryName);$env:PATH"
          odin version
      - name: Build and test
        run: ./test.ps1
        shell: pwsh
      - name: Read version
        id: version_meta
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_meta.outputs.version }}
          name: v${{ steps.version_meta.outputs.version }}
          body: |
            Automated release for VERSION ${{ steps.version_meta.outputs.version }}
          files: bin/*.exe
