name: CI

on:
  push:
    branches: [ '**' ]
    paths:
      - '**.odin'
      - 'VERSION'
      - 'build.*'
      - '.github/workflows/**'
  pull_request:
    branches: [ '**' ]
    paths:
      - '**.odin'
      - 'VERSION'
      - 'build.*'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Odin
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/odin-lang/Odin/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^odin-windows-amd64-.*\.zip$' } | Select-Object -First 1
          if (-not $asset) { throw "Could not find a Windows Odin release asset." }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile odin.zip
          Expand-Archive -Path odin.zip -DestinationPath "$env:RUNNER_TEMP\odin" -Force

          $odinExe = Get-ChildItem "$env:RUNNER_TEMP\odin" -Recurse -Filter odin.exe | Select-Object -First 1
          if (-not $odinExe) { throw "odin.exe not found after extraction." }

          "$($odinExe.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$($odinExe.DirectoryName);$env:PATH"
          odin version
      - name: Build all
        run: ./build.ps1
        shell: pwsh
      - name: Run tests
        run: ./test.ps1
        shell: pwsh

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect VERSION change
        id: version_change
        shell: pwsh
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"
          $zero = "0000000000000000000000000000000000000000"

          if ($before -eq $zero) {
            $files = git show --pretty='' --name-only $after
          } else {
            $files = git diff --name-only $before $after
          }

          $changed = ($files | Where-Object { $_ -eq 'VERSION' } | Select-Object -First 1)
          if ($changed) {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
      - name: Set up Odin
        if: steps.version_change.outputs.changed == 'true'
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/odin-lang/Odin/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^odin-windows-amd64-.*\.zip$' } | Select-Object -First 1
          if (-not $asset) { throw "Could not find a Windows Odin release asset." }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile odin.zip
          Expand-Archive -Path odin.zip -DestinationPath "$env:RUNNER_TEMP\odin" -Force

          $odinExe = Get-ChildItem "$env:RUNNER_TEMP\odin" -Recurse -Filter odin.exe | Select-Object -First 1
          if (-not $odinExe) { throw "odin.exe not found after extraction." }

          "$($odinExe.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$($odinExe.DirectoryName);$env:PATH"
          odin version
      - name: Read version
        if: steps.version_change.outputs.changed == 'true'
        id: version_meta
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Build all
        if: steps.version_change.outputs.changed == 'true'
        run: ./build.ps1
        shell: pwsh
      - name: Create Release
        if: steps.version_change.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_meta.outputs.version }}
          name: v${{ steps.version_meta.outputs.version }}
          body: |
          files: bin/*.exe
            Automated release for VERSION ${{ steps.version_meta.outputs.version }}
